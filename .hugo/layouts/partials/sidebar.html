<!-- layouts/partials/sidebar.html -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <a href="{{ .Site.BaseURL }}" class="sidebar-title">{{ .Site.Title }}</a>
    <button id="sidebar-toggle" class="sidebar-toggle" aria-controls="sidebar-nav" aria-expanded="true">
      <span aria-hidden="true">☰</span>
    </button>
  </div>
  <nav id="sidebar-nav" class="sidebar-nav">
    <ul>
      {{- range .Site.Sections.ByTitle }}
        {{- partial "sidebar-section.html" (dict "page" . "current" $) }}
      {{- end }}
    </ul>
  </nav>
</aside>

<script>
  // Remember whether the sidebar is expanded or collapsed across page loads.
  // Collapsing toggles a class on <body>, which shrinks the sidebar's own
  // grid column, rather than just hiding the section list inside it.
  const body = document.body;
  const toggle = document.getElementById('sidebar-toggle');

  function setSidebarOpen(open) {
    body.classList.toggle('sidebar-collapsed', !open);
    toggle.setAttribute('aria-expanded', open);
    localStorage.setItem('sidebarOpen', open);
  }

  const saved = localStorage.getItem('sidebarOpen');
  setSidebarOpen(saved === null ? true : saved === 'true');

  toggle.addEventListener('click', () => {
    setSidebarOpen(body.classList.contains('sidebar-collapsed'));
  });
</script>
