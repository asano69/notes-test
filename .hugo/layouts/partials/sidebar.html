<!-- layouts/partials/sidebar.html -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <a href="{{ .Site.BaseURL }}" class="sidebar-title">{{ .Site.Title }}</a>
    <button id="sidebar-toggle" class="sidebar-toggle" aria-controls="sidebar-nav" aria-expanded="true">
      <span aria-hidden="true">☰</span>
    </button>
  </div>
  <nav id="sidebar-nav" class="sidebar-nav">
    <ul>
      {{- range .Site.Sections.ByTitle }}
        {{- partial "sidebar-section.html" (dict "page" . "current" $) }}
      {{- end }}
    </ul>
  </nav>
</aside>

<script>
  // Remember whether the section list is expanded or collapsed across page loads.
  const nav = document.getElementById('sidebar-nav');
  const toggle = document.getElementById('sidebar-toggle');

  function setNavOpen(open) {
    nav.hidden = !open;
    toggle.setAttribute('aria-expanded', open);
    localStorage.setItem('sidebarNavOpen', open);
  }

  const saved = localStorage.getItem('sidebarNavOpen');
  setNavOpen(saved === null ? true : saved === 'true');

  toggle.addEventListener('click', () => setNavOpen(nav.hidden));
</script>
