<!-- layouts/partials/sidebar.html -->
<button id="sidebar-toggle" class="sidebar-toggle" aria-controls="sidebar" aria-expanded="true">
  <span aria-hidden="true">☰</span>
</button>

<aside id="sidebar" class="sidebar">
  <nav class="sidebar-nav">
    <ul>
      {{ range .Site.Sections.ByTitle }}
        <li{{ if eq .Section $.Section }} class="active"{{ end }}>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  </nav>
</aside>

<style>
  /* Sidebar layout and collapse behavior */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 240px;
    overflow-y: auto;
    background: #f5f5f5;
    transition: transform 0.2s ease;
    z-index: 100;
  }
  .sidebar.is-collapsed {
    transform: translateX(-100%);
  }
  .sidebar-nav ul {
    list-style: none;
    margin: 0;
    padding: 1rem;
  }
  .sidebar-nav li.active a {
    font-weight: bold;
  }
  .sidebar-toggle {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 101;
  }

  /* Shift main content when sidebar is open on wide screens */
  body.sidebar-open main {
    margin-left: 240px;
  }
</style>
<script>
  // Toggle sidebar visibility and remember state across page loads
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebar-toggle');

  function setSidebarState(open) {
    sidebar.classList.toggle('is-collapsed', !open);
    document.body.classList.toggle('sidebar-open', open);
    toggle.setAttribute('aria-expanded', open);
    localStorage.setItem('sidebarOpen', open);
  }

  const saved = localStorage.getItem('sidebarOpen');
  setSidebarState(saved === null ? true : saved === 'true');

  toggle.addEventListener('click', () => {
    const isOpen = !sidebar.classList.contains('is-collapsed');
    setSidebarState(!isOpen);
  });
</script>
