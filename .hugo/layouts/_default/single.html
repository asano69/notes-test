{{ define "main" }}
<div class="page-wrapper">
  <article class="content">
    <h1 data-pagefind-weight="10">{{ .Title }}</h1>
    {{- with .Params.summary }}
    <p class="summary" data-pagefind-weight="5">{{ . }}</p>
    {{- end }}
    {{ .Content }}
    {{ partial "backlinks.html" . }}
  </article>
  {{ if .TableOfContents }}
  <aside class="toc-sidebar">
    <nav class="toc">
      <h2 class="toc-title">Outline</h2>
      {{ .TableOfContents }}
    </nav>
  </aside>
  {{ end }}
</div>
{{ end }}
