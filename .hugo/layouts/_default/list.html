{{ define "main" }}
<div class="post-list">
  <h1>{{ .Title }}</h1>
  {{- $pages := .Pages }}
  <ul class="card-list">
    {{- range $pages }}
    <li class="card">
      <h2 class="card-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <div class="card-meta">
        <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
          {{ .Date.Format "January 2, 2006 15:04" }}
        </time>
        <div class="card-tags">
          {{- range .Params.tags }}
          <a class="tag" href="{{ ($.Site.GetPage (printf "/tags/%s" .)).Permalink }}">{{ . }}</a>
          {{- end }}
        </div>
      </div>
      {{- with .Summary }}
      <p class="card-summary">{{ . }}</p>
      {{- end }}
    </li>
    {{- end }}
  </ul>
</div>
{{ end }}
